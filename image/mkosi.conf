# PAI box image (FILESYSTEM_v4 §8: install is image-based; one team =
# one image instance = one box). Invoked by image/build, which stages
# the payload first — broker binary, python runtime + agent venv,
# units, /etc/pai seeds — so this file only assembles a stock Ubuntu
# with that tree overlaid. Staging/cache/output live on builder-local
# disk (/var/lib/pai-image — the repo may sit on a shared filesystem
# that can't hold real image ownership); image/build passes them as
# CLI flags.
#
# Format is `directory`: bootable with systemd-nspawn for dev. The VPS
# disk profile (kernel, bootloader, systemd-repart) layers on later
# without changing the tree.

[Distribution]
Distribution=ubuntu
Release=noble
Repositories=main,universe

[Output]
Format=directory
ImageId=pai

[Content]
Hostname=pai
Autologin=yes
Bootable=no
# Lean base: systemd owns lifecycle, ssh is break-glass, the rest is the
# members' bash-tool toolbox. No distro python — the runtime ships its own
# interpreter under /usr/lib/pai/python.
Packages=systemd
         systemd-sysv
         dbus
         udev
         apt
         openssh-server
         sudo
         ca-certificates
         iproute2
         curl
         git
         ripgrep
         less
