# XcodeGen spec for the PAI menubar app.
#
# Regenerate the Xcode project after editing this file or adding new sources:
#
#   cd macos && xcodegen generate
#
# project.pbxproj IS committed (so clones build with just Xcode, no xcodegen).
# Re-run xcodegen whenever this file changes.

name: PAI
options:
  bundleIdPrefix: com.pai
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Ad-hoc signing ("-"): the app embeds a Python runtime + the kernel, so
    # it must be signed (with entitlements) for the hardened runtime to load
    # those libs. Developer ID is deferred — flip CODE_SIGN_IDENTITY +
    # DEVELOPMENT_TEAM the day a permission-bearing feature lands. The
    # authoritative inside-out re-sign happens in repo-root ./paibuild
    # (delegating to macos/bundle-runtime.sh for full runtime embedding);
    # these settings keep a plain Xcode build self-consistent.
    # See memory pai-app-consolidation.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    # Developer ID flip (the day an Apple Developer account lands): set the two
    # below and pass SIGN_ID="Developer ID Application: … (TEAMID)" to
    # ./paibuild (optionally with --notarize). Left commented so ad-hoc builds
    # stay the default.
    # DEVELOPMENT_TEAM: ABCDE12345
    # CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  PAI:
    type: application
    platform: macOS
    sources:
      - path: PAI
    info:
      path: PAI/Info.plist
      properties:
        # Menubar-only agent — no dock icon, no main menu.
        LSUIElement: true
        # The app OWNS the kernel, so only one instance may run.
        LSMultipleInstancesProhibited: true
        CFBundleName: PAI
        CFBundleDisplayName: PAI
        CFBundleIdentifier: com.pai.menubar
        # Asset-catalog app icon. Needed explicitly because GENERATE_INFOPLIST_FILE
        # is NO, so Xcode won't inject CFBundleIconName for us. LSUIElement means
        # no Dock icon, but Finder/.dmg/notifications still use it.
        CFBundleIconName: AppIcon
        NSHumanReadableCopyright: ""
        NSUserNotificationsUsageDescription: "PAI posts a notification when one of your PAIs finishes a turn."
        # TCC prompts. These keys make macOS surface the consent dialog the
        # first time the kernel (running as the embedded python signed under
        # this bundle's identity) hits each service. Without the key the call
        # is silently denied and no prompt is ever shown. Full Disk Access and
        # Accessibility are user-toggle services and don't key off a string.
        NSContactsUsageDescription: "PAI reads your contacts so it can recognise people you mention by name and address messages on your behalf."
        NSCalendarsFullAccessUsageDescription: "PAI reads and writes calendar events so it can answer questions about your schedule and add events you ask it to."
        NSRemindersFullAccessUsageDescription: "PAI reads and writes reminders so it can manage tasks you ask it to track."
        NSMicrophoneUsageDescription: "PAI listens to the microphone when you start a voice conversation with it."
        NSLocationWhenInUseUsageDescription: "PAI uses your location so it can answer questions that depend on where you are (weather, nearby places, travel time)."
        NSAppleEventsUsageDescription: "PAI controls Messages, Mail, Calendar, and System Events so it can send messages and create events on your behalf."
        NSDesktopFolderUsageDescription: "PAI reads files from your Desktop when you ask it to work with them."
        NSDocumentsFolderUsageDescription: "PAI reads files from your Documents folder when you ask it to work with them."
        NSDownloadsFolderUsageDescription: "PAI reads files from your Downloads folder when you ask it to work with them."
        NSSystemAdministrationUsageDescription: "PAI runs system-administration scripts on your behalf when you ask it to change system settings."
        # macOS 14+ scenes-based lifecycle.
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_NAME: PAI
        PRODUCT_BUNDLE_IDENTIFIER: com.pai.menubar
        CODE_SIGN_ENTITLEMENTS: PAI/PAI.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        # No sandbox: the app reads/writes ~/.pai/ as the owner. Sandboxing
        # would require user-selected file access per directory — defeats
        # the "second client of the same filesystem" model.
        ENABLE_APP_SANDBOX: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
