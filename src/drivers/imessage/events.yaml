# Event spec for the imessage driver.
#
# `kind` is the routing key — the string `_route_to_pids` in
# src/boot/main.py matches against `wake_on` patterns. Use these
# strings (or globs over them) in etc/config.yaml `wake_on:` lists.
#
# `raw_kind` is the YAML `kind:` field on the event file in
# home/events/ — that's what `_handle_event_file` switches on. Mostly
# useful when reading raw event files for debugging.
#
# `payload` documents the shape of the `context` dict the receiving PAI
# sees in its user-turn event block.

driver: imessage
description: Inbound and outbound iMessage routing.

events:
  - kind: imessage:new
    description: A new message arrived from a contact, or Arda sent
      one from his phone (echoed back via chat.db).
    emitted_by: src/drivers/imessage/inbound.py
    raw_kind: new_message
    payload:
      thread: string         # contact slug
      sender: string         # "me" if from_me, else contact slug
      text: string
      day_file: string       # relative path to the day's .md file

  - kind: imessage:owner
    description: Owner sent a message to PAI via the TUI. Routed
      separately because `thread == "me"` is the PAI/owner channel,
      not a contact thread.
    emitted_by: src/tui/app.py
    raw_kind: new_message
    payload:
      thread: "me"
      sender: "me"
      text: string
      day_file: string       # me/{routed_pid}/{date}.md

  - kind: imessage:backlog
    description: Kernel just booted and found messages that landed
      while it was offline. Coalesced into a single nudge instead of N.
    emitted_by: src/drivers/imessage/inbound.py
    raw_kind: messages_backlog
    payload:
      since: string          # ISO datetime of earliest backlog message
      threads:               # per-thread aggregation
        - thread: string
          inbound: int       # messages received from contact
          outbound: int      # Arda's messages from his phone
          last_text: string
      total: int

  - kind: imessage:send_failed
    description: An outbound message couldn't be delivered (recipient
      not on iMessage, SMS relay unavailable, etc.). The line is
      already in the thread day-file but was never sent.
    emitted_by: src/drivers/imessage/outbound.py
    raw_kind: send_failed
    payload:
      thread: string
      text: string
      reason: string
