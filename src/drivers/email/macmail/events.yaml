# Event spec for the macmail driver.
#
# `kind` is the routing key — match against `wake_on:` in etc/config.yaml.
# `raw_kind` is what `_handle_event_file` switches on in src/boot/main.py.

driver: macmail
description: Inbound and outbound email via the macOS Mail.app.

events:
  - kind: email:new
    description: A new email landed in INBOX, or an outbound message
      appeared in the Sent folder (Arda sent from Mail.app, or Mail.app
      flushed a draft PAI saved earlier).
    emitted_by: src/drivers/email/macmail/inbound.py
    raw_kind: new_email
    payload:
      account: string         # email address that owns the account
      thread_slug: string
      subject: string
      from: string
      direction: string       # "inbound" | "outbound"
      path: string            # relative path to the canonical yaml

  - kind: email:backlog
    description: Kernel just booted and found mail that landed while it
      was offline. Coalesced into a single nudge instead of N.
    emitted_by: src/drivers/email/macmail/inbound.py
    raw_kind: email_backlog
    payload:
      since: string           # ISO datetime of earliest backlog message
      accounts:
        - account: string
          count: int
          last_subject: string
      total: int

  - kind: email:draft_failed
    description: PAI wrote a draft yaml but Mail.app couldn't materialize
      it into the Drafts folder (bad recipient, AppleScript error, etc.).
    emitted_by: src/drivers/email/macmail/outbound.py
    raw_kind: draft_failed
    payload:
      account: string
      path: string
      reason: string
