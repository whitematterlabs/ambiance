# systemd-tmpfiles: the system-plane skeleton (FILESYSTEM_v4.md ownership
# map). Per-member spool dirs are laid by provision-member at unit start.
# Group-writable by the broker so it can lay broker.sock itself;
# per-member run dirs are root-provisioned.
d /run/pai            0775 root       pai-broker -
d /etc/pai            0755 root       root -
d /var/spool/pai      0755 root       root -
d /var/lib/pai        0755 root       root -
d /var/lib/pai/memory 2775 root       org  -
d /var/lib/pai/memory/deals 2755 root root -
# Broker-owned: it appends the audit log; adm reads.
d /var/log/pai        0750 pai-broker adm  -
